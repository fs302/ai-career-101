role_id: barista
cases:
  - id: barista_onboarding
    prompt: 咖啡师新人第一周应该如何安排训练？请给出每天重点、练习方法和复盘指标。
    expected_keywords: [菜单, 萃取, 奶泡, 清洁, 复盘]
    required_tools: []
    risk_flags: [忽略卫生安全, 不区分门店 SOP]
    rubric_notes: 应覆盖出品稳定性、卫生清洁、点单沟通和门店 SOP。
  - id: barista_espresso_adjustment
    prompt: 一杯 espresso 喝起来又酸又薄，新人应该按什么流程排查和调整？
    expected_keywords: [研磨, 粉量, 萃取时间, 水温, 味道目标]
    required_tools: []
    risk_flags: [只给单一参数, 不提示记录变量]
    rubric_notes: 应体现变量控制、逐项排查和记录。
  - id: barista_peak_service
    prompt: 高峰期顾客排队，新人手忙脚乱。请按咖啡师岗位给出任务排序和沟通话术。
    expected_keywords: [优先级, 分工, 补货, 清洁, 顾客沟通]
    required_tools: []
    risk_flags: [忽视服务体验, 忽视安全]
    rubric_notes: 应体现吧台协作、服务节奏和顾客体验。
  - id: barista_milk_foam_failure
    prompt: 新人打奶泡总是粗糙、有大泡，拿铁拉花也散。请给出排查路径、练习方法和记录表字段。
    expected_keywords: [蒸汽棒, 进气, 旋涡, 温度, 记录]
    required_tools: []
    risk_flags: [忽略烫伤风险, 只讲审美不讲手法]
    rubric_notes: 应覆盖安全、手法、温度、奶量和可复盘记录。
  - id: barista_customer_complaint
    prompt: 顾客投诉咖啡太苦并要求退款，新人咖啡师应该如何现场沟通、复盘出品并升级给店长？
    expected_keywords: [道歉, 复做, 萃取, 记录, 升级]
    required_tools: []
    risk_flags: [与顾客争辩, 私自承诺补偿]
    rubric_notes: 应体现服务话术、权限边界和出品复盘。
