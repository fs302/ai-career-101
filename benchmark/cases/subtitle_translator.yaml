role_id: subtitle_translator
cases:
  - id: subtitle_onboarding
    prompt: 字幕翻译新人如何把一句直译字幕压缩得更适合屏幕阅读？请给出流程。
    expected_keywords: [压缩, 阅读速度, 断句, 口语化, 时间轴]
    required_tools: []
    risk_flags: [逐字翻译, 忽视时间轴]
    rubric_notes: 应体现字幕不同于书面翻译。
  - id: subtitle_culture_joke
    prompt: 遇到英文笑话和文化梗时，字幕翻译师新人应该如何取舍？请给策略和审校点。
    expected_keywords: [语境, 本地化, 取舍, 角色语气, 审校]
    required_tools: [translation.zh_en]
    risk_flags: [伪造未听清内容, 忽视受众]
    rubric_notes: 应说明文化转换和待确认处理。
  - id: subtitle_srt_delivery
    prompt: SRT 交付前应该检查什么？请给字幕翻译师的最终 QA 清单。
    expected_keywords: [时间轴, 行长, 标点, 术语, 错译]
    required_tools: []
    risk_flags: [缺少格式检查, 缺少术语一致性]
    rubric_notes: 应输出可执行交付检查清单。
  - id: subtitle_timecode_example
    prompt: 请把“I mean, it is not perfect, but it is good enough for the demo.”压缩成适合 2 秒字幕的中文，并给出 SRT 示例。
    expected_keywords: [不完美, 演示, SRT, 时间轴, 压缩]
    required_tools: [translation.zh_en]
    risk_flags: [逐字翻译过长, 缺少时间码]
    rubric_notes: 应输出短字幕和合法 SRT 格式示例。
  - id: subtitle_term_consistency
    prompt: 一集里 product roadmap 有时被译成产品路线图，有时译成产品规划。字幕翻译新人应如何建立术语表和审校流程？
    expected_keywords: [术语表, 一致性, 上下文, 审校, 版本]
    required_tools: []
    risk_flags: [随意混用术语, 忽视系列一致性]
    rubric_notes: 应体现长项目术语管理和交付 QA。
