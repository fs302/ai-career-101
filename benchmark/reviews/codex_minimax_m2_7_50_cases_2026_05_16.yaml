summary:
  overall_score: 0.799
  conclusion: "扩展到每职业 5 个更强 case 后，MiniMax-M2.7 的总体完成度约 79.9%。结构化导师能力仍然稳定，但工具链没有真正进入文本 benchmark 的工作流，营销、同传、字幕、营养师等角色在工具命中和工程化交付上明显掉分。"
  top_roles:
    - ophthalmologist
    - game_artist
    - interior_designer
  improvement_priorities:
    - "把 image.generate、vision.describe、translation.zh_en、speech.tts 接入 benchmark case 的真实附件或工具执行，而不是只让模型口头说明。"
    - "为低分 case 增加职业交付模板，例如 SRT、投放素材矩阵、TTS 音频产物、餐盘复盘记录。"
    - "缩短职业系统 prompt，控制 MiniMax 生成时延，并保留 case 级失败记录。"
