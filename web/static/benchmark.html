<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Career-101 Benchmark</title>
    <link rel="stylesheet" href="/static/styles.css">
